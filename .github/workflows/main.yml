name: MANO-Develop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GitHubMail: "happymarv3@gmail.com"
  GitHubName: "happy-lappy"

jobs:
  nanadevelop:
    runs-on: ubuntu-20.04
    steps:
      - name: Set Git Configs & Secrets
        run: |
          git config --global user.email ${GitHubMail}
          git config --global user.name ${GitHubName}
      - name: Setup Py3
        uses: actions/setup-python@v2.2.2
        with:
          python-version: '3.9.9'
      - name: Gather repo
        run: |
          git clone "https://${{ secrets.GH_TOK }}@github.com/happy-lappy/mano-bot" mano-dev || exit 1
          git clone "https://${{ secrets.GH_TOK }}@github.com/happy-lappy/mano-db.git" dbase || exit 1
      - name: Cache deps
        uses: actions/cache@v2
        with:
          path: ${{ env.pythonLocation }}
          key: "mano"
      - name: install deps
        run: |
          cd mano-dev
          pip3 install wheel
          pip3 install -r requirements.txt
